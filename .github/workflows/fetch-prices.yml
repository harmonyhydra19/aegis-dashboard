name: Fetch IDX Prices

on:
  schedule:
    - cron: '*/15 * * * *'   # setiap 15 menit
  workflow_dispatch:           # bisa trigger manual dari GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests yfinance

      - name: Run fetch
        run: python fetch_prices.py

      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u +%H:%M)"
          git push
