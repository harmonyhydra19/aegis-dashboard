name: Aegis Alpha Price Sync

on:
  schedule:
    # Berjalan setiap 30 menit selama jam bursa (Senin-Jumat, 02:00 - 09:00 UTC atau 09:00 - 16:00 WIB)
    - cron: '*/30 2-9 * * 1-5'
  workflow_dispatch: # Memungkinkan tombol "Run workflow" manual di tab Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Prices
        run: python fetch_prices.py

      - name: Commit and Push
        run: |
          git config --global user.name "Aegis-Bot"
          git config --global user.email "bot@aegis.alpha"
          git add prices.json
          git commit -m "Sync Market Data: $(date)" || exit 0
          git push
