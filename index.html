<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aegis Alpha v1.5 - Live JSON Sync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,100;0,9..144,200;1,9..144,200&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #04080f; --bg2: #080f1c; --bg3: #0c1525; --border: #162035; --border2: #1e2f4a;
      --text: #d8e8ff; --muted: #3d5a80; --green: #2de08a; --red: #e05555; --amber: #f0c060;
      --accent: #2c6be0; --bmri: #e05555; --admf: #f0c060; --itmg: #2de08a; --asii: #4d9de0; --indf: #9b79e0;
    }
    body { font-family: 'DM Mono', monospace; background-color: var(--bg); color: var(--text); font-size: 13px; }
    .display { font-family: 'Fraunces', serif; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; border: 1px solid; }
    .bg-bull { background: #021210; color: var(--green); border-color: #0a2a1a; }
    .br-bear { background: #130808; color: var(--red); border-color: #281010; }
    .progress-bg { background: #101d30; height: 6px; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; transition: width 0.5s; }
    .nav-item.active { border-left: 2px solid var(--accent); background: linear-gradient(90deg, var(--bg3), transparent); }
  </style>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 border-r border-[var(--border)] flex flex-col shrink-0">
    <div class="p-4 border-b border-[var(--border)]">
      <h1 class="display text-2xl italic">Aegis Alpha <span class="text-[var(--accent)] text-lg">v1.5</span></h1>
    </div>
    <div class="p-4 space-y-4 border-b border-[var(--border)]">
      <div>
        <div class="flex justify-between text-[10px] mb-1"><span>Porto Target</span><span id="porto-pct">0%</span></div>
        <div class="progress-bg"><div id="porto-bar" class="progress-fill bg-[var(--accent)]" style="width:0%"></div></div>
      </div>
    </div>
    <nav class="flex-1 p-2 space-y-1">
      <button class="nav-item active w-full flex items-center px-3 py-2 rounded text-sm"><i data-lucide="layout-dashboard" class="w-4 h-4 mr-3"></i> Dashboard</button>
    </nav>
    <div class="p-4 border-t border-[var(--border)]">
      <button onclick="fetchData()" class="w-full py-2 bg-[var(--bg3)] border border-[var(--border2)] rounded text-xs flex justify-center items-center gap-2">
        <i data-lucide="refresh-cw" class="w-3 h-3"></i> Sync Data
      </button>
      <div class="mt-3 text-[10px] text-[var(--muted)] flex justify-between items-center">
        <span id="last-fetch">Last: Never</span>
        <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
      </div>
      <p id="status-text" class="text-[9px] mt-1 text-center italic">Waiting for Sync...</p>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-y-auto p-6 space-y-6">
    <!-- KPI -->
    <div class="grid grid-cols-4 gap-4">
      <div class="card">
        <span class="text-[10px] text-[var(--muted)]">Equity Value</span>
        <div id="kpi-equity" class="text-xl font-bold mt-1">Rp 0</div>
      </div>
      <div class="card">
        <span class="text-[10px] text-[var(--muted)]">Unrealized P&L</span>
        <div id="kpi-pnl" class="text-xl font-bold mt-1">Rp 0</div>
      </div>
      <div class="card">
        <span class="text-[10px] text-[var(--muted)]">IHSG</span>
        <div id="ihsg-val" class="text-xl font-bold mt-1">-</div>
        <span id="ihsg-pct" class="badge">0%</span>
      </div>
      <div class="card">
        <span class="text-[10px] text-[var(--muted)]">USD/IDR</span>
        <div id="usd-val" class="text-xl font-bold mt-1">-</div>
      </div>
    </div>

    <!-- Matrix -->
    <h2 class="display text-lg">Stock Command Matrix</h2>
    <div id="stock-matrix" class="grid grid-cols-5 gap-4"></div>

    <!-- Table -->
    <div class="card overflow-x-auto">
      <table class="w-full text-xs text-left">
        <thead class="text-[var(--muted)] border-b border-[var(--border)]">
          <tr><th class="pb-2">Ticker</th><th class="pb-2">Price</th><th class="pb-2">Lots</th><th class="pb-2">Avg</th><th class="pb-2">P&L</th></tr>
        </thead>
        <tbody id="stock-table" class="divide-y divide-[var(--border)]"></tbody>
      </table>
    </div>
  </main>

  <script>
    lucide.createIcons();

    const portfolio = {
      BMRI: { avgPrice: 4641, lots: 10, invested: 4641952, color: "var(--bmri)", target: 35 },
      ADMF: { avgPrice: 8888, lots: 4, invested: 3555325, color: "var(--admf)", target: 25 },
      ITMG: { avgPrice: 26239, lots: 3, invested: 7871790, color: "var(--itmg)", target: 20 },
      ASII: { avgPrice: 6150, lots: 3, invested: 1845263, color: "var(--asii)", target: 15 },
      INDF: { avgPrice: 6685, lots: 2, invested: 1337002, color: "var(--indf)", target: 5 }
    };

    let liveData = {};

    async function fetchData() {
      const btn = document.querySelector('button[onclick="fetchData()"]');
      const dot = document.getElementById('status-dot');
      const st = document.getElementById('status-text');
      btn.disabled = true;
      st.textContent = 'Syncing...';
      dot.className = "w-2 h-2 rounded-full bg-yellow-500 animate-pulse";

      try {
        const res = await fetch('prices.json?t=' + Date.now());
        if(!res.ok) throw new Error();
        const data = await res.json();
        liveData = data;

        // IHSG & USD
        document.getElementById('ihsg-val').textContent = Math.round(data.market.IHSG.price).toLocaleString();
        document.getElementById('ihsg-pct').textContent = data.market.IHSG.chgPct + '%';
        document.getElementById('ihsg-pct').className = `badge ${data.market.IHSG.chgPct >= 0 ? 'bg-bull' : 'br-bear'}`;
        document.getElementById('usd-val').textContent = 'Rp ' + Math.round(data.market.USDIDR.price).toLocaleString();

        dot.className = "w-2 h-2 rounded-full bg-green-500";
        st.textContent = 'Synced: ' + data.updated_wib;
        document.getElementById('last-fetch').textContent = 'Last: ' + data.updated_wib;
        
        render();
      } catch(e) {
        dot.className = "w-2 h-2 rounded-full bg-red-500";
        st.textContent = 'JSON Not Found';
      } finally { btn.disabled = false; }
    }

    function render() {
      const matrix = document.getElementById('stock-matrix');
      const table = document.getElementById('stock-table');
      matrix.innerHTML = ''; table.innerHTML = '';

      let totalMV = 0;
      let totalInv = 0;

      Object.keys(portfolio).forEach(t => {
        const p = portfolio[t];
        const d = liveData.stocks[t] || { price: 0, chgPct: 0 };
        const mv = d.price * p.lots * 100;
        const pnl = mv - p.invested;
        const pnlPct = (pnl / p.invested * 100).toFixed(2);
        
        totalMV += mv;
        totalInv += p.invested;

        // Matrix
        matrix.innerHTML += `
          <div class="card" style="border-top: 3px solid ${p.color}">
            <div class="flex justify-between items-start">
              <span class="font-bold text-lg">${t}</span>
              <span class="badge ${d.chgPct >= 0 ? 'bg-bull' : 'br-bear'}">${d.chgPct}%</span>
            </div>
            <div class="text-base mt-2">Rp ${d.price.toLocaleString()}</div>
            <div class="text-[10px] ${pnl >= 0 ? 'text-[var(--green)]' : 'text-[var(--red)]'} mt-1">${pnlPct}%</div>
          </div>
        `;

        // Table
        table.innerHTML += `
          <tr class="hover:bg-[var(--bg3)] transition">
            <td class="py-3 font-bold">${t}</td>
            <td>${d.price.toLocaleString()}</td>
            <td>${p.lots}</td>
            <td>${p.avgPrice.toLocaleString()}</td>
            <td class="${pnl >= 0 ? 'text-[var(--green)]' : 'text-[var(--red)]'}">${pnlPct}%</td>
          </tr>
        `;
      });

      document.getElementById('kpi-equity').textContent = 'Rp ' + Math.round(totalMV).toLocaleString();
      const totalPnl = totalMV - totalInv;
      const totalPnlPct = (totalPnl / totalInv * 100).toFixed(2);
      document.getElementById('kpi-pnl').textContent = (totalPnl >= 0 ? '+' : '') + totalPnlPct + '%';
      document.getElementById('kpi-pnl').className = `text-xl font-bold mt-1 ${totalPnl >= 0 ? 'text-[var(--green)]' : 'text-[var(--red)]'}`;

      const portoGoal = 250000000;
      const progress = Math.min((totalMV / portoGoal * 100), 100).toFixed(1);
      document.getElementById('porto-pct').textContent = progress + '%';
      document.getElementById('porto-bar').style.width = progress + '%';
    }

    // Auto load
    window.onload = fetchData;
  </script>
</body>
</html>
